# ── notification-service  (Node.js · port 8006) ───────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: seatsavvy
  labels:
    app: notification-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8006"
    spec:
      containers:
      - name: notification-service
        image: notification-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8006
        env:
        - name: DATABASE_URL
          value: "mysql://notify:pass@notification-db:3306/notification_db"
        - name: RABBIT_URL
          value: "amqp://guest:guest@rabbitmq:5672"
        - name: ORDER_SVC_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: ORDER_SVC_URL
        - name: USER_SVC_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: USER_SVC_URL
        - name: CATALOG_SVC_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CATALOG_SVC_URL
        - name: OVERRIDE_EMAIL
          valueFrom:
            secretKeyRef:
              name: smtp-secret
              key: override-email
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: smtp-secret
              key: smtp-user
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: smtp-secret
              key: smtp-pass
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8006
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8006
          initialDelaySeconds: 40
          periodSeconds: 20
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: seatsavvy
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
  - port: 8006
    targetPort: 8006
