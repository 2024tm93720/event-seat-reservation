# ════════════════════════════════════════════════════════════════════════════
#  Application Microservices
# ════════════════════════════════════════════════════════════════════════════

# ── user-service  (FastAPI · Python · port 8001) ──────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: seatsavvy
  labels:
    app: user-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8001"
    spec:
      containers:
      - name: user-service
        image: user-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8001
        env:
        - name: DATABASE_URL
          value: "mysql+pymysql://user:pass@user-db:3306/user_db"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: seatsavvy
  labels:
    app: user-service
spec:
  selector:
    app: user-service
  ports:
  - port: 8001
    targetPort: 8001

