# ── seating-service  (Node.js · port 8003) ────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seating-service
  namespace: seatsavvy
  labels:
    app: seating-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seating-service
  template:
    metadata:
      labels:
        app: seating-service
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8003"
    spec:
      containers:
      - name: seating-service
        image: seating-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8003
        env:
        - name: DATABASE_URL
          value: "mysql://seating:pass@seating-db:3306/seating_db"
        - name: HOLD_TTL_MIN
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: HOLD_TTL_MIN
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: seating-service
  namespace: seatsavvy
  labels:
    app: seating-service
spec:
  selector:
    app: seating-service
  ports:
  - port: 8003
    targetPort: 8003

# ── order-service  (Spring Boot · Java · port 8965) ───────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: seatsavvy
  labels:
    app: order-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8965"
    spec:
      containers:
      - name: order-service
        image: order-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8965
        env:
        - name: DB_HOST
          value: "order-db"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "order_db"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: order-db-secret
              key: username
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: order-db-secret
              key: password
        - name: RABBIT_HOST
          value: "rabbitmq"
        - name: RABBIT_PORT
          value: "5672"
        - name: RABBIT_USER
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: username
        - name: RABBIT_PASS
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: password
        - name: SEATING_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: SEATING_SVC_URL
        - name: CATALOG_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CATALOG_SVC_URL
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "750m"
            memory: "768Mi"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8965
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8965
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: seatsavvy
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
  - port: 8965
    targetPort: 8965

