# ── Frontend  (React + Nginx · port 3001) ─────────────────────────────────────
# Nginx inside the container proxies /api/* paths to the backend ClusterIP
# services, so all API traffic flows through the frontend pod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: seatsavvy
  labels:
    app: frontend
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 20
          periodSeconds: 20
          timeoutSeconds: 3
---
# ClusterIP — used by Ingress
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: seatsavvy
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
  - port: 3001
    targetPort: 3001
---
# NodePort — direct browser access without Ingress
apiVersion: v1
kind: Service
metadata:
  name: frontend-nodeport
  namespace: seatsavvy
  labels:
    app: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 3001
    targetPort: 3001
    nodePort: 30080
