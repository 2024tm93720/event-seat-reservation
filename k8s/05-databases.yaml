# ════════════════════════════════════════════════════════════════════════════
#  MySQL Databases  (user / catalog / seating / notification)
# ════════════════════════════════════════════════════════════════════════════

# ── user-db ───────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-db
  namespace: seatsavvy
  labels:
    app: user-db
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-db
  template:
    metadata:
      labels:
        app: user-db
        tier: database
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: root-password
        - name: MYSQL_DATABASE
          value: "user_db"
        - name: MYSQL_USER
          value: "user"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: password
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "localhost", "-prootpass"]
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "localhost", "-prootpass"]
          initialDelaySeconds: 40
          periodSeconds: 20
          timeoutSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: user-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: user-db
  namespace: seatsavvy
  labels:
    app: user-db
spec:
  selector:
    app: user-db
  ports:
  - port: 3306
    targetPort: 3306

