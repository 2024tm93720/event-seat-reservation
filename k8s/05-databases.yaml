# ════════════════════════════════════════════════════════════════════════════
#  PostgreSQL Databases  (order / payment)
# ════════════════════════════════════════════════════════════════════════════

# ── order-db (PostgreSQL) ─────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db
  namespace: seatsavvy
  labels:
    app: order-db
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
        tier: database
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "order_db"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: order-db-secret
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: order-db-secret
              key: password
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "order_user", "-d", "order_db"]
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "order_user", "-d", "order_db"]
          initialDelaySeconds: 40
          periodSeconds: 20
          timeoutSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: order-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: order-db
  namespace: seatsavvy
  labels:
    app: order-db
spec:
  selector:
    app: order-db
  ports:
  - port: 5432
    targetPort: 5432

