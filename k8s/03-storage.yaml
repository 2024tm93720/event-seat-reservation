# ── PersistentVolumeClaims for all stateful services ──────────────────────────
# Each database and RabbitMQ gets its own PVC backed by Minikube's
# standard StorageClass (hostPath provisioner).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-db-pvc
  namespace: seatsavvy
  labels:
    app: user-db
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
