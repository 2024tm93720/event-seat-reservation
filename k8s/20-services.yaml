---
apiVersion: apps/v1
kind: Deployment
metadata: { name: user-service, namespace: ticketing }
spec:
  replicas: 1
  selector: { matchLabels: { app: user-service } }
  template:
    metadata:
      labels: { app: user-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      containers:
      - name: user-service
        image: user-service:latest
        imagePullPolicy: IfNotPresent
        ports: [{ containerPort: 8001 }]
        env:
        - { name: DATABASE_URL, value: "mysql+pymysql://user:pass@user-db:3306/user_db" }
        envFrom:
        - configMapRef: { name: ticketing-config }
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits: { cpu: "500m", memory: "512Mi" }
        readinessProbe:
          httpGet: { path: /health, port: 8001 }
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet: { path: /health, port: 8001 }
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata: { name: user-service, namespace: ticketing }
spec:
  type: NodePort
  selector: { app: user-service }
  ports:
  - port: 8001
    targetPort: 8001
    nodePort: 30001
