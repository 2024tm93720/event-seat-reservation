# ── MySQL shared passwords ────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: seatsavvy
type: Opaque
stringData:
  root-password: "rootpass"
  password:      "pass"
---
# ── PostgreSQL — order-db ─────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: order-db-secret
  namespace: seatsavvy
type: Opaque
stringData:
  username: "order_user"
  password: "order_pass"
---
# ── PostgreSQL — payment-db ───────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: payment-db-secret
  namespace: seatsavvy
type: Opaque
stringData:
  username: "pay_user"
  password: "pay_pass"
---
# ── RabbitMQ credentials ──────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: seatsavvy
type: Opaque
stringData:
  username: "guest"
  password: "guest"
---
# ── SMTP / email credentials (fill in before deploying) ───────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: smtp-secret
  namespace: seatsavvy
type: Opaque
stringData:
  smtp-user: ""          # e.g. yourname@gmail.com
  smtp-pass: ""          # Gmail App Password
  override-email: "deenbenny@gmail.com"
---
# ── Grafana admin password ────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: seatsavvy
type: Opaque
stringData:
  admin-password: "admin"
