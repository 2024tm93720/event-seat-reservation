apiVersion: v1
kind: ConfigMap
metadata: { name: prometheus-config, namespace: ticketing }
data:
  prometheus.yml: |
    global: { scrape_interval: 15s }
    scrape_configs:
    - job_name: 'user-service'
      static_configs: [{ targets: ['user-service:8001'] }]
    - job_name: 'catalog-service'
      static_configs: [{ targets: ['catalog-service:8002'] }]
    - job_name: 'seating-service'
      static_configs: [{ targets: ['seating-service:8003'] }]
    - job_name: 'order-service'
      static_configs: [{ targets: ['order-service:8004'] }]
    - job_name: 'payment-service'
      static_configs: [{ targets: ['payment-service:8005'] }]
    - job_name: 'notification-service'
      static_configs: [{ targets: ['notification-service:8006'] }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: prometheus, namespace: ticketing }
spec:
  replicas: 1
  selector: { matchLabels: { app: prometheus } }
  template:
    metadata: { labels: { app: prometheus } }
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.54.1
        ports: [{ containerPort: 9090 }]
        volumeMounts:
        - { name: cfg, mountPath: /etc/prometheus }
      volumes:
      - name: cfg
        configMap: { name: prometheus-config }
---
apiVersion: v1
kind: Service
metadata: { name: prometheus, namespace: ticketing }
spec:
  type: NodePort
  selector: { app: prometheus }
  ports: [{ port: 9090, targetPort: 9090, nodePort: 30090 }]
