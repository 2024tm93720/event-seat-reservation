---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: user-db-pvc, namespace: ticketing }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: user-db, namespace: ticketing }
spec:
  replicas: 1
  selector: { matchLabels: { app: user-db } }
  template:
    metadata: { labels: { app: user-db } }
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom: { secretKeyRef: { name: ticketing-secrets, key: MYSQL_ROOT_PASSWORD } }
        - { name: MYSQL_DATABASE, value: "user_db" }
        - { name: MYSQL_USER, value: "user" }
        - name: MYSQL_PASSWORD
          valueFrom: { secretKeyRef: { name: ticketing-secrets, key: MYSQL_PASSWORD } }
        ports: [{ containerPort: 3306 }]
        resources:
          requests: { cpu: "100m", memory: "256Mi" }
          limits: { cpu: "500m", memory: "512Mi" }
        readinessProbe:
          exec: { command: ["mysqladmin","ping","-h","localhost","-prootpass"] }
          initialDelaySeconds: 20
          periodSeconds: 10
        volumeMounts: [{ name: data, mountPath: /var/lib/mysql }]
      volumes:
      - name: data
        persistentVolumeClaim: { claimName: user-db-pvc }
---
apiVersion: v1
kind: Service
metadata: { name: user-db, namespace: ticketing }
spec:
  selector: { app: user-db }
  ports: [{ port: 3306, targetPort: 3306 }]
