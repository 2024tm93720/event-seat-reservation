# Event Ticketing System - full local stack
# user/catalog/seating/notification: Node.js / Python + MySQL
# order/payment: Java Spring Boot + PostgreSQL + RabbitMQ async messaging
version: "3.9"

x-mysql-env: &mysql-env
  MYSQL_ROOT_PASSWORD: rootpass

services:
  # ---------------- MySQL Databases (user / catalog / seating / notification) ----------------
  user-db:
    image: mysql:8.0
    environment:
      <<: *mysql-env
      MYSQL_DATABASE: user_db
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
    volumes:
      - user-db-data:/var/lib/mysql
      - ./db-init/user:/docker-entrypoint-initdb.d:ro
    ports: ["33061:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  catalog-db:
    image: mysql:8.0
    environment:
      <<: *mysql-env
      MYSQL_DATABASE: catalog_db
      MYSQL_USER: catalog
      MYSQL_PASSWORD: pass
    volumes:
      - catalog-db-data:/var/lib/mysql
      - ./db-init/catalog:/docker-entrypoint-initdb.d:ro
    ports: ["33062:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  seating-db:
    image: mysql:8.0
    environment:
      <<: *mysql-env
      MYSQL_DATABASE: seating_db
      MYSQL_USER: seating
      MYSQL_PASSWORD: pass
    volumes:
      - seating-db-data:/var/lib/mysql
      - ./db-init/seating:/docker-entrypoint-initdb.d:ro
    ports: ["33063:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-db:
    image: mysql:8.0
    environment:
      <<: *mysql-env
      MYSQL_DATABASE: notification_db
      MYSQL_USER: notify
      MYSQL_PASSWORD: pass
    volumes:
      - notification-db-data:/var/lib/mysql
      - ./db-init/notification:/docker-entrypoint-initdb.d:ro
    ports: ["33066:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------- PostgreSQL Databases (order / payment) ----------------
  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./db-init/order:/docker-entrypoint-initdb.d:ro
    ports: ["54321:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: pay_user
      POSTGRES_PASSWORD: pay_pass
    volumes:
      - payment-db-data:/var/lib/postgresql/data
      - ./db-init/payment:/docker-entrypoint-initdb.d:ro
    ports: ["54322:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pay_user -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------- RabbitMQ (async messaging between order and payment) ----------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------- Microservices ----------------
  user-service:
    build: ./user-service
    environment:
      DATABASE_URL: mysql+pymysql://user:pass@user-db:3306/user_db
    ports: ["8001:8001"]
    depends_on:
      user-db:
        condition: service_healthy

  catalog-service:
    build: ./catalog-service
    environment:
      DATABASE_URL: mysql+pymysql://catalog:pass@catalog-db:3306/catalog_db
    ports: ["8002:8002"]
    depends_on:
      catalog-db:
        condition: service_healthy

  seating-service:
    build: ./seating-service
    environment:
      DATABASE_URL: mysql://seating:pass@seating-db:3306/seating_db
      HOLD_TTL_MIN: "15"
    ports: ["8003:8003"]
    depends_on:
      seating-db:
        condition: service_healthy

  order-service:
    build: ./order-service
    environment:
      DB_HOST: order-db
      DB_PORT: "5432"
      DB_NAME: order_db
      DB_USER: order_user
      DB_PASS: order_pass
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: "5672"
      RABBIT_USER: guest
      RABBIT_PASS: guest
      SEATING_SERVICE_URL: http://seating-service:8003
      CATALOG_SERVICE_URL: http://catalog-service:8002
    ports: ["8965:8965"]
    depends_on:
      order-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-service:
    build: ./payment-service
    environment:
      DB_HOST: payment-db
      DB_PORT: "5432"
      DB_NAME: payment_db
      DB_USER: pay_user
      DB_PASS: pay_pass
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: "5672"
      RABBIT_USER: guest
      RABBIT_PASS: guest
    ports: ["9865:9865"]
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    environment:
      DATABASE_URL:     mysql://notify:pass@notification-db:3306/notification_db
      RABBIT_URL:       amqp://guest:guest@rabbitmq:5672
      ORDER_SVC_URL:    http://order-service:8965
      USER_SVC_URL:     http://user-service:8001
      CATALOG_SVC_URL:  http://catalog-service:8002
      OVERRIDE_EMAIL:   deenbenny@gmail.com
      SMTP_USER:        ""   # your Gmail address  e.g. yourname@gmail.com
      SMTP_PASS:        ""   # Gmail App Password  (Gmail → Security → App Passwords)
    ports: ["8006:8006"]
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      order-service:
        condition: service_started
      user-service:
        condition: service_started
      catalog-service:
        condition: service_started

  # ---------------- Frontend ----------------
  frontend:
    build: ./frontend
    ports: ["3001:3001"]
    depends_on:
      - user-service
      - catalog-service
      - seating-service
      - order-service
      - payment-service
      - notification-service

  # ---------------- Monitoring ----------------
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    depends_on: [user-service, catalog-service, seating-service, order-service, payment-service, notification-service]

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports: ["3000:3000"]
    depends_on: [prometheus]

volumes:
  user-db-data:
  catalog-db-data:
  seating-db-data:
  order-db-data:
  payment-db-data:
  notification-db-data:
