server:
  port: 8965

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:order_db}
    username: ${DB_USER:order_user}
    password: ${DB_PASS:order_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # schema managed by Flyway / SQL scripts
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: orders

  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
    virtual-host: /

# OpenFeign base-URLs for downstream sync calls
app:
  seating-service-url: ${SEATING_SERVICE_URL:http://localhost:8083}
  catalog-service-url: ${CATALOG_SERVICE_URL:http://localhost:8082}

  rabbitmq:
    exchange: ticketing.exchange
    routing-key:
      payment-request: order.payment.request
      order-events:    order.events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.ticketing.order: DEBUG
    org.springframework.amqp: INFO
