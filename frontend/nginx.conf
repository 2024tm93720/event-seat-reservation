server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to backend services
    location /api/users/    { proxy_pass http://user-service:8001/;    }
    location /api/catalog/  { proxy_pass http://catalog-service:8002/; }
    location /api/seating/  { proxy_pass http://seating-service:8003/; }
    location /api/orders/   { proxy_pass http://order-service:8965/;   }
    location /api/payments/ { proxy_pass http://payment-service:9865/; }
    location /api/notifications/ { proxy_pass http://notification-service:8006/; }
}
